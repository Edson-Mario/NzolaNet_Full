<div class="profile-page" *ngIf="!loading() && user() as u">
  <div class="profile-header">
    <div class="profile-cover"></div>
    <div class="profile-info">
      <div class="profile-avatar">
        <img
          *ngIf="u.fotoPerfil"
          [src]="u.fotoPerfil"
          alt="avatar"
          loading="lazy"
        />
        <svg *ngIf="!u.fotoPerfil" class="avatar-fallback-svg" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </svg>
      </div>
      <div class="profile-details">
        <h1>{{ u.nome }}</h1>

        <div class="profile-stats">
          <div class="stat">
            <strong>{{ posts().length }}</strong>
            <span>Publicações</span>
          </div>
          <div class="stat clickable" (click)="loadSeguidores()">
            <strong>{{ u.seguidoresCount }}</strong>
            <span>Seguidores</span>
          </div>
          <div class="stat clickable" (click)="loadSeguindo()">
            <strong>{{ u.seguindoCount }}</strong>
            <span>Seguindo</span>
          </div>
        </div>
      </div>
      <div class="profile-actions">
        <button *ngIf="isOwnProfile" class="btn-outline" (click)="openEditModal()">
          Editar perfil
        </button>
        <button
          *ngIf="!isOwnProfile"
          class="btn-follow"
          [class.following]="u.isFollowing"
          (click)="toggleFollow()"
        >
          {{ u.isFollowing ? 'Deixar de seguir' : 'Seguir' }}
        </button>
        <button
          *ngIf="isOwnProfile"
          class="btn-deactivate"
          [class.activate]="u.isActive === false"
          (click)="u.isActive === false ? activateAccount() : deactivateAccount()"
        >
          {{ u.isActive === false ? 'Ativar conta' : 'Desativar conta' }}
        </button>
      </div>
    </div>
  </div>

  <div class="profile-posts">
    <h2>Publicações</h2>
    <app-post-card
      *ngFor="let post of posts(); trackBy: trackByPostId"
      [post]="post"
      (deleted)="onPostDeleted($event)"
    ></app-post-card>
    <div class="empty" *ngIf="posts().length === 0">
      <p>Nenhuma publicacao ainda.</p>
    </div>
  </div>

  <!-- Edit Profile Modal -->
  <div class="modal-overlay" *ngIf="showEditModal" (click)="closeEditModal()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <app-edit-profile
        [user]="u"
        (saved)="onProfileUpdated($event)"
        (cancelled)="closeEditModal()"
      ></app-edit-profile>
    </div>
  </div>

  <!-- Followers List Modal -->
  <div class="modal-overlay" *ngIf="showFollowersList" (click)="closeFollowersList()">
    <div class="modal-content list-modal" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h3>Seguidores</h3>
        <button class="btn-close" (click)="closeFollowersList()">&times;</button>
      </div>
      <div class="user-list">
        <div class="user-item" *ngFor="let us of seguidores(); trackBy: trackByUserId">
          <div class="user-item-avatar">
            <img *ngIf="us.fotoPerfil" [src]="us.fotoPerfil" alt="avatar" loading="lazy" />
            <svg *ngIf="!us.fotoPerfil" class="avatar-fallback-svg" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
          </div>
          <span class="user-item-name">{{ us.nome }}</span>
          <button
            *ngIf="us.id !== auth.currentUser()?.id"
            class="btn-follow-small"
            [class.following]="us.isFollowing"
            (click)="toggleFollowUser(us)"
          >
            {{ us.isFollowing ? 'Deixar de seguir' : 'Seguir' }}
          </button>
        </div>
        <div class="empty" *ngIf="seguidores().length === 0">
          <p>Nenhum seguidor.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Following List Modal -->
  <div class="modal-overlay" *ngIf="showFollowingList" (click)="closeFollowingList()">
    <div class="modal-content list-modal" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h3>Seguindo</h3>
        <button class="btn-close" (click)="closeFollowingList()">&times;</button>
      </div>
      <div class="user-list">
        <div class="user-item" *ngFor="let us of seguindo(); trackBy: trackByUserId">
          <div class="user-item-avatar">
            <img *ngIf="us.fotoPerfil" [src]="us.fotoPerfil" alt="avatar" loading="lazy" />
            <svg *ngIf="!us.fotoPerfil" class="avatar-fallback-svg" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
          </div>
          <span class="user-item-name">{{ us.nome }}</span>
          <button
            *ngIf="us.id !== auth.currentUser()?.id"
            class="btn-follow-small"
            [class.following]="us.isFollowing"
            (click)="toggleFollowUser(us)"
          >
            {{ us.isFollowing ? 'Deixar de seguir' : 'Seguir' }}
          </button>
        </div>
        <div class="empty" *ngIf="seguindo().length === 0">
          <p>Ninguem seguido.</p>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="loading" *ngIf="loading()">
  <div class="spinner"></div>
</div>
