<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1 class="logo">NzolaNet</h1>
      <p>Registar</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label>Nome</label>
        <input type="text" [(ngModel)]="nome" name="nome" required placeholder="Seu nome" />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" name="email" required placeholder="exemplo@email.com" />
      </div>

      <div class="form-group">
        <label>Senha</label>
        <input type="password" [(ngModel)]="senha" name="senha" required minlength="6" placeholder="Mínimo 6 caracteres" />
      </div>

      <div class="form-group">
        <label>Confirmar senha</label>
        <input type="password" [(ngModel)]="confirmSenha" name="confirmSenha" required placeholder="Repita a senha" />
      </div>

      <div class="form-group">
        <label>Foto de perfil (opcional)</label>
        <input type="file" accept="image/*" (change)="onFileSelect($event)" />
      </div>

      <div class="error" *ngIf="error()">{{ error() }}</div>

      <button type="submit" class="btn-primary" [disabled]="loading()">
        {{ loading() ? 'A registar...' : 'Registar' }}
      </button>
    </form>

    <div class="auth-footer">
      <p>Já tem conta? <a routerLink="/login">Entrar</a></p>
    </div>
  </div>
</div>
