<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1 class="logo">NzolaNet</h1>
      <p>Entrar</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" name="email" required placeholder="exemplo@email.com" />
      </div>

      <div class="form-group">
        <label>Senha</label>
        <input type="password" [(ngModel)]="senha" name="senha" required placeholder="********" />
      </div>

      <div class="error" *ngIf="error">{{ error }}</div>

      <button type="submit" class="btn-primary" [disabled]="loading">
        {{ loading ? '...' : 'Entrar' }}
      </button>
    </form>

    <div class="auth-footer">
      <a routerLink="/forgot-password">Esqueceu a senha?</a>
      <p>Não tem conta? <a routerLink="/register">Registar</a></p>
    </div>
  </div>
</div>
